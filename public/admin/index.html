<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>杉蔓官網 後台管理系統</title>
</head>
<body>
  <script>
    // 將 CMS 設定直接內嵌，避免外部 config.yml 的 404 問題
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'sustainablemans-website/officialwebsite',
          branch: 'main',
          base_url: 'https://www.sustainablemans.com',
          auth_endpoint: 'api/auth',
        },
        media_folder: 'public/images/uploads',
        public_folder: '/images/uploads',
        locale: 'zh_Hant',
        collections: [
          // ── 1. 知識專刊文章
          {
            name: 'articles',
            label: '📰 知識專刊文章',
            folder: 'src/content/articles',
            create: true,
            delete: true,
            slug: '{{slug}}',
            extension: 'md',
            format: 'frontmatter',
            fields: [
              { label: '文章標題', name: 'title', widget: 'string' },
              { label: '分類', name: 'category', widget: 'string', hint: '例如：碳管理, ESG策略, 淨零技術' },
              { label: '文章摘要', name: 'description', widget: 'text' },
              { label: '強調色', name: 'accent', widget: 'select', options: ['emerald', 'blue', 'yellow', 'green-primary', 'blue-accent'], default: 'emerald' },
              { label: '文章內容', name: 'body', widget: 'markdown' },
            ],
          },

          // ── 2. 服務項目
          {
            name: 'services',
            label: '🌿 服務項目',
            files: [{
              name: 'services_list',
              label: '服務項目列表',
              file: 'src/data/services.json',
              fields: [{
                label: '服務列表', name: 'services', widget: 'list',
                fields: [
                  { label: '網址代號 (slug)', name: 'slug', widget: 'string' },
                  { label: '服務名稱', name: 'title', widget: 'string' },
                  { label: '簡短說明', name: 'description', widget: 'text' },
                  { label: '圖示名稱 (Lucide)', name: 'icon', widget: 'string' },
                  { label: '強調色', name: 'accent', widget: 'select', options: ['emerald', 'blue', 'yellow', 'purple'], default: 'emerald' },
                  { label: '服務詳細說明', name: 'longDescription', widget: 'text' },
                  { label: '核心特色', name: 'features', widget: 'list', field: { label: '特色描述', name: 'feature', widget: 'string' } },
                ],
              }],
            }],
          },

          // ── 3. 團隊成員
          {
            name: 'team',
            label: '👥 專業顧問團隊',
            files: [{
              name: 'team_list',
              label: '團隊成員列表',
              file: 'src/data/team.json',
              fields: [{
                label: '團隊成員', name: 'team', widget: 'list',
                fields: [
                  { label: '姓名', name: 'name', widget: 'string' },
                  { label: '職稱', name: 'role', widget: 'string' },
                  { label: '照片', name: 'image', widget: 'image', required: false },
                  { label: '專長列表', name: 'specialties', widget: 'list', field: { label: '專長', name: 'specialty', widget: 'string' } },
                ],
              }],
            }],
          },

          // ── 4. 活動紀錄
          {
            name: 'activities',
            label: '🌱 行動紀錄',
            files: [{
              name: 'activities_list',
              label: '活動紀錄列表',
              file: 'src/data/activities.json',
              fields: [{
                label: '活動列表', name: 'activities', widget: 'list',
                fields: [
                  { label: '活動名稱', name: 'title', widget: 'string' },
                  { label: '日期', name: 'date', widget: 'string', hint: '格式：YYYY.MM.DD' },
                  { label: '活動照片', name: 'image', widget: 'image' },
                ],
              }],
            }],
          },

          // ── 5. 公司基本資訊
          {
            name: 'site_settings',
            label: '⚙️ 公司基本設定',
            files: [{
              name: 'site',
              label: '公司資訊與社群連結',
              file: 'src/data/site.json',
              fields: [
                { label: '公司中文名稱', name: 'companyName', widget: 'string' },
                { label: '公司英文名稱', name: 'companyEnglishName', widget: 'string' },
                { label: '品牌標語', name: 'slogan', widget: 'string' },
                { label: '公司簡介', name: 'description', widget: 'text' },
                { label: '聯絡資訊', name: 'contact', widget: 'object', fields: [
                  { label: 'Email', name: 'email', widget: 'string' },
                  { label: '電話', name: 'phone', widget: 'string' },
                  { label: '地址', name: 'address', widget: 'string' },
                ]},
                { label: '社群連結', name: 'social', widget: 'object', fields: [
                  { label: 'Facebook', name: 'facebook', widget: 'string' },
                  { label: 'Instagram', name: 'instagram', widget: 'string' },
                  { label: 'LinkedIn', name: 'linkedin', widget: 'string' },
                ]},
              ],
            }],
          },

          // ── 6. 合作夥伴
          {
            name: 'partners',
            label: '🤝 合作夥伴',
            files: [{
              name: 'partners_list',
              label: '合作夥伴列表',
              file: 'src/data/partners.json',
              fields: [{
                label: '合作夥伴', name: 'partners', widget: 'list',
                fields: [
                  { label: '夥伴名稱', name: 'name', widget: 'string' },
                  { label: 'Logo 圖片', name: 'logo', widget: 'image' },
                ],
              }],
            }],
          },
        ],
      },
    });
  </script>
</body>
</html>
